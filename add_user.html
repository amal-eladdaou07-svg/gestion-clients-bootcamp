<!DOCTYPE html>
<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connexion</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        :root {
            --primary-color: #004d40; /* Vert foncé */
            --secondary-color: #00796b; /* Vert moyen */
            --accent-color: #ff5722; /* Orange vif */
            --background-color: #f5f5f5; /* Gris clair */
            --card-background: #ffffff; /* Blanc */
            --text-color: #212121; /* Gris foncé */
            --link-color: #00796b; /* Vert moyen */
            --hover-link-color: #004d40; /* Vert foncé */
            --border-color: #e0e0e0; /* Bordure grise claire */
            --delete-button-color: #e53935; /* Rouge vif */
            --delete-button-hover-color: #c62828; /* Rouge foncé */
        }

        body {
            margin: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--background-color);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .login_card {
            background-color: var(--card-background);
            padding: 2rem;
            border-radius: 10px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
            max-width: 400px;
            width: 100%;
        }

        h2 {
            color: var(--primary-color);
            margin-bottom: 1.5rem;
            font-size: 1.75rem;
            text-align: center;
            font-weight: 600;
        }

        label {
            display: block;
            color: var(--text-color);
            margin-bottom: 0.5rem;
            font-weight: 500;
        }

        input[type="text"], input[type="password"] {
            width: 100%;
            padding: 0.75rem;
            margin-bottom: 1rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            font-size: 1rem;
            color: var(--text-color);
            background-color: var(--background-color);
            transition: border-color 0.3s;
        }

        input[type="text"]:focus, input[type="password"]:focus {
            border-color: var(--primary-color);
            outline: none;
        }

        button {
            width: 100%;
            padding: 0.75rem;
            background-color: var(--primary-color);
            color: #ffffff;
            border: none;
            border-radius: 5px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: background-color 0.3s;
        }

        button:hover {
            background-color: var(--secondary-color);
        }

        a {
            display: block;
            text-align: center;
            margin-top: 1rem;
            color: var(--link-color);
            text-decoration: none;
            font-size: 0.9rem;
            transition: color 0.3s;
        }

        a:hover {
            color: var(--hover-link-color);
        }
    </style>
</head>
<body>
    <div class="login_card">
    <h1>Ajouter un Utilisateur</h1>
    <form action="insert_user.php" method="post">
        <label for="nom_utilisateur">Nom d'utilisateur:</label>
        <input type="text" id="nom_utilisateur" name="nom_utilisateur" required><br><br>

        <label for="mot_de_passe">Mot de passe:</label>
        <input type="password" id="mot_de_passe" name="mot_de_passe" required><br><br>

        <label for="email">Adresse e-mail:</label>
        <input type="email" id="email" name="email" required><br><br>

        <button type="submit">Ajouter</button>
    </form>
    </div>
</body>
</html>
